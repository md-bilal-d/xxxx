<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AgentForge — Run History and Audit Logs">
  <title>AgentForge — History</title>
  <link rel="stylesheet" href="css/premium_core.css">
  <style>
    /* History specific styles */
    .toolbar-glass {
      display: flex; align-items: center; justify-content: space-between; gap: 24px;
      padding: 16px 24px; margin-bottom: 16px;
    }
    
    .search-group { position: relative; flex: 1; max-width: 400px; }
    .search-ico { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-muted); }
    .search-input {
      width: 100%; height: 40px; background: rgba(0,0,0,0.2);
      border: 1px solid var(--border-glass); border-radius: 8px;
      padding: 0 16px 0 40px; color: white; font-family: inherit; font-size: 14px;
    }
    .search-input:focus { border-color: var(--teal); outline: none; }
    
    .filter-group { display: flex; gap: 8px; }
    .filter-chip {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border-glass);
      color: var(--text-secondary); padding: 6px 12px; border-radius: 6px;
      font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .filter-chip:hover { background: rgba(255,255,255,0.06); }
    .filter-chip.active { background: var(--purple-glow); color: white; border-color: var(--purple); }

    .pagination { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; padding: 0 8px; }
    .page-info { font-size: 12px; color: var(--text-muted); font-weight: 600; }
    .page-btns { display: flex; gap: 6px; }

    /* Drawer refactor */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      z-index: 2000; opacity: 0; visibility: hidden; transition: 0.3s;
    }
    .drawer-overlay.active { opacity: 1; visibility: visible; }
    
    .drawer {
      position: fixed; right: 0; top: 0; bottom: 0; width: 480px;
      background: var(--bg-aside); border-left: 1px solid var(--border-glass);
      z-index: 2001; transform: translateX(100%); transition: transform 0.4s var(--ease-out);
      padding: 32px; display: flex; flex-direction: column; gap: 24px;
    }
    .drawer.active { transform: translateX(0); }
    .drawer-header { display: flex; align-items: center; justify-content: space-between; }
    .drawer-close { font-size: 20px; color: var(--text-muted); cursor: pointer; }
  </style>
</head>
<body>

  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar">
      <a href="index.html" class="nav-btn" data-tooltip="Dashboard"><i class="ico">🏠</i></a>
      <a href="pipeline.html" class="nav-btn" data-tooltip="Pipeline"><i class="ico">▶</i></a>
      <a href="history.html" class="nav-btn active" data-tooltip="History"><i class="ico">☰</i></a>
      <a href="config.html" class="nav-btn" data-tooltip="Settings"><i class="ico">⚙</i></a>
      <a href="mobile.html" class="nav-btn" data-tooltip="Mobile Monitor" style="margin-top:auto; margin-bottom: 24px;"><i class="ico">📱</i></a>
    </aside>

    <div class="main-container">
      <!-- Topbar -->
      <header class="topbar">
        <div class="logo-group">
          <div class="logo-af">AF</div>
          <div class="breadcrumb">
            <span class="muted">AgentForge /</span> Run History
          </div>
        </div>
        <div class="status-group">
          <div class="pulse-dot"></div>
          <div class="badge-teal-pill">3 agents online</div>
        </div>
      </header>

      <!-- Page Content -->
      <main class="page-content">
        
        <div class="section-header">
          <h2>📋 Run History <span class="badge-teal-pill" id="totalCount">12</span></h2>
          <button class="btn-ghost" onclick="exportHistory()">Download JSON</button>
        </div>

        <div class="glass-card">
        <div class="section-header">
          <div style="display:flex; gap:16px;">
            <input type="text" id="historySearch" placeholder="Search prompts or IDs..." style="background:rgba(255,255,255,0.05); border:1px solid var(--border-glass); border-radius:8px; padding:8px 16px; color:white; width:300px;">
            <div class="filter-group" style="display:flex; gap:8px;">
               <button class="btn-ghost active" onclick="filterHistory('all')">All Runs</button>
               <button class="btn-ghost" onclick="filterHistory('passed')">Passed</button>
               <button class="btn-ghost" onclick="filterHistory('failed')">Failed</button>
            </div>
          </div>
      </main>
    </div>
  </div>

  <!-- Run Details Drawer -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="runDrawer">
    <div class="drawer-header">
      <h2>Run Details</h2>
      <div class="drawer-close" onclick="closeDrawer()">✕</div>
    </div>
    <div id="drawerBody">
      <!-- Populated by history.js -->
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/history.js"></script>
  <!-- API Key Modal -->
  <style>
    .api-modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .api-modal-overlay.active { opacity: 1; pointer-events: auto; }
    .api-modal {
      background: var(--bg-card, #111120); border: 1px solid var(--border-card, #1e1e35);
      border-radius: 16px; padding: 32px; width: 100%; max-width: 400px;
      text-align: center; transform: translateY(20px); transition: transform 0.3s;
    }
    .api-modal-overlay.active .api-modal { transform: translateY(0); }
    .api-modal h2 { margin-bottom: 8px; font-size: 20px; color: white; display:flex; align-items:center; justify-content:center; gap:10px; }
    .api-modal input {
      width: 100%; background: #0d0d1a; border: 1px solid #2a2a45;
      color: white; padding: 12px; border-radius: 8px; margin: 16px 0;
      outline: none; text-align: center; font-family: monospace;
    }
    .api-modal input:focus { border-color: #7c3aed; }
    .api-modal button {
      width: 100%; background: linear-gradient(135deg, #7c3aed, #4f46e5); color: white;
      border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;
    }
    .api-modal a { display: block; margin-top: 16px; color: #6b7280; font-size: 12px; text-decoration: none; }
    .api-modal a:hover { color: #fff; }
    .api-key-btn { position: fixed; top: 20px; right: 20px; background: #111120; border: 1px solid #1e1e35; color: white; padding: 10px; border-radius: 8px; cursor: pointer; z-index: 1000; display:flex; align-items:center; justify-content:center; transition: .2s; }
    .api-key-btn:hover { background: #1e1e35; }
  </style>

  <button class="api-key-btn" onclick="openApiModal()" aria-label="API Key">🔑 API Key</button>

  <div id="apiKeyModal" class="api-modal-overlay">
    <div class="api-modal">
      <h2><span style="color:#7c3aed;">⬡</span> AgentForge Auth</h2>
      <p style="color:#6b7280; font-size:14px;">Enter your Groq API key to continue</p>
      <input type="password" id="apiKeyValue" placeholder="gsk_...">
      <button onclick="saveApiKey()">Save & Continue</button>
      <a href="https://console.groq.com/" target="_blank">Get your API key at console.groq.com</a>
    </div>
  </div>

  <script>
    function openApiModal() {
      const stored = localStorage.getItem("groq_key");
      if(stored) document.getElementById("apiKeyValue").value = stored;
      document.getElementById("apiKeyModal").classList.add("active");
    }
    function closeApiModal() {
      document.getElementById("apiKeyModal").classList.remove("active");
    }
    function saveApiKey() {
      const val = document.getElementById("apiKeyValue").value.trim();
      if(val) {
        localStorage.setItem("groq_key", val);
        closeApiModal();
      }
    }
    window.addEventListener("DOMContentLoaded", () => {
      if(!localStorage.getItem("groq_key")) {
        openApiModal();
      }
    });
  </script>
</body>
</html>
